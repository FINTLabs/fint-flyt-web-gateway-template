name: MD

on:
    workflow_dispatch:
        inputs:
            cluster:
                description: Select an environment
                required: true
                type: choice
                options:
                    - aks-beta-fint-2021-11-23
                    - aks-api-fint-2022-02-08
            org:
                description: Select organisation
                required: true
                type: choice
                options:
                    - afk-no
                    - agderfk-no
                    - bfk-no
                    - ffk-no
                    - fintlabs-no
                    - innlandetfylke-no
                    - mrfylke-no
                    - nfk-no
                    - ofk-no
                    - rogfk-no
                    - telemarkfylke-no
                    - tromsfylke-no
                    - trondelagfylke-no
                    - vestfoldfylke-no
                    - vlfk-no

jobs:
    build:
        uses: FINTLabs/fint-flyt-github-workflows/.github/workflows/java-app-build-image.yaml@main
        with:
            push-image: true
        secrets: inherit

    deploy:
        needs: build
        uses: FINTLabs/fint-flyt-github-workflows/.github/workflows/java-app-deploy-aks.yaml@main
        with:
            org: ${{ inputs.org }}
            cluster: ${{ inputs.cluster }}
            image-ref: ${{ needs.build.outputs.image-ref }}
        secrets: inherit
